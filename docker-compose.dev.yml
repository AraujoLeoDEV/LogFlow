services:
  postgres_dev:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: logistica_db_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis_dev:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  backend_dev:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    environment:
      DATABASE_URL: postgresql://postgres:123456@postgres_dev:5432/logistica_db_dev
      DB_HOST: postgres_dev
      DB_NAME: logistica_db_dev
      REDIS_HOST: redis_dev
    ports:
      - '3001:3000'
    volumes:
      - ./backend:/app
      - backend_node_modules_dev:/app/node_modules
      - backend_storage_dev:/app/storage
    depends_on:
      postgres_dev:
        condition: service_healthy
      redis_dev:
        condition: service_healthy

  frontend_dev:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    ports:
      - '5174:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules_dev:/app/node_modules
      - ./frontend/.env.dev:/app/.env
    depends_on:
      - backend_dev

volumes:
  postgres_data_dev:
  backend_node_modules_dev:
  backend_storage_dev:
  frontend_node_modules_dev:
